apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd    # 必须是 argocd 命名空间
spec:
  project: default
  source:
    repoURL: https://github.com/pengdake/home-chart.git
    targetRevision: main
    path: charts/kube-prometheus-stack      # 指向你自定义 Helm Chart 的路径
    helm:
      releaseName: prometheus
      parameters:
      - name: alertmanager.ingress.enabled
        value: "true"
      - name: grafana.ingress.enabled
        value: "true"
      - name: prometheus.ingress.enabled
        value: "true"


  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
