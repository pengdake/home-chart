apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opensearch-dashboards
  namespace: argocd    # 必须是 argocd 命名空间
spec:
  project: default
  source:
    repoURL: https://github.com/pengdake/home-chart.git
    targetRevision: main
    path: charts/opensearch-dashboards      # 指向你自定义 Helm Chart 的路径
    helm:
      releaseName: opensearch-dashboards
      parameters:
      - name: ingress.enabled
        value: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: log

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
