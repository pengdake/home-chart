apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-postgresql-cluster
  namespace: argocd    # 必须是 argocd 命名空间
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/pengdake/home-chart.git
    targetRevision: main
    path: charts/cluster      # 指向你自定义 Helm Chart 的路径
    helm:
      releaseName: cloudnative-postgresql-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true